<!doctype html>
{% load blog_extras %}
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Ansel Boero{% endblock %}</title>
  <style>
    html, body { background: #000; }
    body { font-family: -apple-system, system-ui, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; line-height: 1.6; color: #e6e6e6; }
    a { color: #58a6ff; }
    h1 a { color: inherit; text-decoration: none; }
    header { border-bottom: 1px solid #2a2a2a; padding-bottom: 1rem; margin-bottom: 2rem; }
    time { color: #999; font-size: 0.9rem; }
    article + article { margin-top: 2rem; padding-top: 2rem; border-top: 1px solid #2a2a2a; }
    footer { border-top: 1px solid #2a2a2a; margin-top: 3rem; padding-top: 1rem; color: #999; font-size: 0.9rem; }
    footer img.poster { height: 50px; width: auto; vertical-align: middle; margin-right: 0.5rem; border-radius: 2px; }
  </style>
</head>
<body>
  <header>
    <h1><a href="{% url 'entry_list' %}">Ansel's Blog</a></h1>
  </header>
  {% block content %}{% endblock %}
  {% last_movie as movie %}
  {% if movie %}
    <footer>
      {% if movie.poster_link %}<a href="{{ movie.imdb_link }}" target="_blank" rel="noopener noreferrer"><img class="poster" src="{{ movie.poster_link }}" alt="{{ movie.title }} poster" loading="lazy"></a>{% endif %}
      Last movie watched: <a href="{{ movie.imdb_link }}" target="_blank" rel="noopener noreferrer">{{ movie.title }}</a>{% if movie.rating %} — {{ movie.rating }}/10{% endif %}
    </footer>
  {% endif %}
</body>
</html>
