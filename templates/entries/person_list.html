{% extends "base.html" %}

{% block title %}People — Ansel Boero{% endblock %}

{% block content %}
  <h2>People</h2>
  <ul>
    {% for person in people %}
      <li><a href="{{ person.get_absolute_url }}">{{ person.name }}</a></li>
    {% empty %}
      <li>No people yet.</li>
    {% endfor %}
  </ul>
{% endblock %}
