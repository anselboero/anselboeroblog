<div class="book-grid">
  {% for book in books %}
    <div class="book-card">
      <a href="{{ book.get_absolute_url }}" class="book-cover-link">
        {% if book.cover_url %}
          <img src="{{ book.cover_url }}" alt="{{ book.title }} cover" loading="lazy">
        {% else %}
          <div class="book-cover-placeholder">{{ book.title }}</div>
        {% endif %}
      </a>
      <div class="book-meta">
        <div class="book-title"><a href="{{ book.get_absolute_url }}">{{ book.title }}</a></div>
        {% if show_author|default_if_none:True %}
          <div class="book-author">by <a href="{{ book.author.get_absolute_url }}">{{ book.author.name }}</a></div>
        {% endif %}
      </div>
    </div>
  {% empty %}
    <p>No books yet.</p>
  {% endfor %}
</div>
