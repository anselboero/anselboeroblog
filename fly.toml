# fly.toml app configuration file generated for anselboeroblog on 2026-05-16T12:31:59+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'anselboeroblog'
primary_region = 'fra'
console_command = 'python manage.py shell'

[build]

[env]
  PORT = '8000'

[[mounts]]
  source = 'data'
  destination = '/data'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
  cpus = 1
  memory_mb = 256

[[statics]]
  guest_path = '/app/staticfiles'
  url_prefix = '/static/'
